<script type="text/babel" data-presets="react">

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
    overflow-wrap:anywhere}

  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}

  .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
    user-select:none;padding-right:8px}
  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="react">
// physics.jsx — verlet-style AABB physics + dependency tracking
// Custom engine because:
// - We need axis-aligned rigid rects with stable resting stacks (Matter's circular contacts add rotation we don't want)
// - We need to know which blocks rest ON which other blocks each frame for dependency math
// - Wobble/squash on impact is simulated via a separate visual "deform" channel, not real soft-body

const PHYS = {
  GRAVITY: 1800,        // px/s^2
  DAMPING: 0.985,       // velocity multiplier per second of "air"
  REST_EPS: 4,          // velocity below this counts as "at rest"
  MAX_DT: 1 / 30,
  SUB_STEPS: 4,         // collision iterations per frame
  WALL_BOUNCE: 0.18,
  FLOOR_BOUNCE: 0.22,
  BLOCK_BOUNCE: 0.08,
  FRICTION: 0.82,       // tangential velocity multiplier on contact
};

class PhysicsWorld {
  constructor(width, height) {
    this.w = width;
    this.h = height;
    this.bodies = new Map(); // id -> body
    this.gravityOn = true;
    this.snapEnabled = false;
    this.gridSize = 20;
    this.onSettle = null;
  }

  setBounds(w, h) { this.w = w; this.h = h; }

  add(body) {
    // body: { id, x, y, w, h, vx, vy, mass, fixed, ax, ay (angle for visual wobble) }
    const b = {
      vx: 0, vy: 0, ax: 0, av: 0, mass: 1, fixed: false,
      restingOn: new Set(), supports: new Set(),
      sleepFrames: 0, justImpacted: 0, deform: 0, deformV: 0,
      ...body,
    };
    this.bodies.set(b.id, b);
    return b;
  }

  remove(id) {
    const b = this.bodies.get(id);
    if (!b) return;
    // Anything resting on this body needs to unstick
    for (const sup of b.supports) {
      const s = this.bodies.get(sup);
      if (s) s.restingOn.delete(id);
    }
    for (const r of b.restingOn) {
      const o = this.bodies.get(r);
      if (o) o.supports.delete(id);
    }
    this.bodies.delete(id);
  }

  get(id) { return this.bodies.get(id); }

  // AABB overlap (returns penetration + axis)
  _overlap(a, b) {
    const ax1 = a.x, ay1 = a.y, ax2 = a.x + a.w, ay2 = a.y + a.h;
    const bx1 = b.x, by1 = b.y, bx2 = b.x + b.w, by2 = b.y + b.h;
    const ox = Math.min(ax2, bx2) - Math.max(ax1, bx1);
    const oy = Math.min(ay2, by2) - Math.max(ay1, by1);
    if (ox <= 0 || oy <= 0) return null;
    return { ox, oy };
  }

  step(dt) {
    dt = Math.min(dt, PHYS.MAX_DT);
    const bodies = [...this.bodies.values()];

    // 1. Integrate
    for (const b of bodies) {
      // Visual deform spring (not part of collision)
      b.deformV += (-b.deform * 60 - b.deformV * 8) * dt;
      b.deform += b.deformV * dt;

      if (b.fixed || b.dragging) continue;
      if (this.gravityOn) b.vy += PHYS.GRAVITY * dt;
      // Air damping
      const damp = Math.pow(PHYS.DAMPING, dt * 60);
      b.vx *= damp;
      b.vy *= damp;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }

    // 2. Collide (multiple iterations for stable stacking)
    for (let iter = 0; iter < PHYS.SUB_STEPS; iter++) {
      // Walls + floor
      for (const b of bodies) {
        if (b.fixed) continue;
        if (b.x < 0) { b.x = 0; if (b.vx < 0) b.vx = -b.vx * PHYS.WALL_BOUNCE; }
        if (b.x + b.w > this.w) { b.x = this.w - b.w; if (b.vx > 0) b.vx = -b.vx * PHYS.WALL_BOUNCE; }
        if (b.y + b.h > this.h) {
          const impactV = b.vy;
          b.y = this.h - b.h;
          if (b.vy > 0) {
            if (impactV > 200) {
              b.deformV -= Math.min(impactV * 0.002, 0.5);
              b.justImpacted = 1;
            }
            b.vy = -b.vy * PHYS.FLOOR_BOUNCE;
            b.vx *= PHYS.FRICTION;
          }
        }
        if (b.y < 0) { b.y = 0; if (b.vy < 0) b.vy = -b.vy * PHYS.WALL_BOUNCE; }
      }

      // Body-body
      for (let i = 0; i < bodies.length; i++) {
        const a = bodies[i];
        for (let j = i + 1; j < bodies.length; j++) {
          const c = bodies[j];
          if (a.fixed && c.fixed) continue;
          if (a.dragging && c.dragging) continue;
          const ov = this._overlap(a, c);
          if (!ov) continue;

          // Resolve along the smallest axis
          if (ov.ox < ov.oy) {
            // Horizontal separation
            const dir = (a.x + a.w / 2) < (c.x + c.w / 2) ? -1 : 1;
            const totalMass = (a.fixed || a.dragging ? 0 : 1) + (c.fixed || c.dragging ? 0 : 1);
            if (totalMass === 0) continue;
            if (a.fixed || a.dragging) {
              c.x -= dir * ov.ox;
              c.vx = -c.vx * PHYS.BLOCK_BOUNCE;
            } else if (c.fixed || c.dragging) {
              a.x += dir * ov.ox;
              a.vx = -a.vx * PHYS.BLOCK_BOUNCE;
            } else {
              a.x += dir * ov.ox / 2;
              c.x -= dir * ov.ox / 2;
              const rel = a.vx - c.vx;
              if ((dir < 0 && rel > 0) || (dir > 0 && rel < 0)) {
                const e = PHYS.BLOCK_BOUNCE;
                const newRel = -rel * e;
                a.vx = (a.vx + c.vx) / 2 + newRel / 2 * (dir < 0 ? 1 : -1);
                c.vx = (a.vx + c.vx) / 2 - newRel / 2 * (dir < 0 ? 1 : -1);
              }
            }
          } else {
            // Vertical separation
            const aBottom = a.y + a.h, cTop = c.y;
            const aOnTop = (a.y + a.h / 2) < (c.y + c.h / 2);
            if (aOnTop) {
              // a sits on c
              if (!a.fixed && !a.dragging) {
                a.y -= ov.oy;
                if (a.vy > 0) {
                  if (a.vy > 200) { a.deformV -= Math.min(a.vy * 0.0015, 0.4); }
                  a.vy = -a.vy * PHYS.BLOCK_BOUNCE;
                }
                a.vx *= PHYS.FRICTION;
              } else if (!c.fixed && !c.dragging) {
                c.y += ov.oy;
                if (c.vy < 0) c.vy = -c.vy * PHYS.BLOCK_BOUNCE;
              }
            } else {
              // c sits on a
              if (!c.fixed && !c.dragging) {
                c.y -= ov.oy;
                if (c.vy > 0) {
                  if (c.vy > 200) { c.deformV -= Math.min(c.vy * 0.0015, 0.4); }
                  c.vy = -c.vy * PHYS.BLOCK_BOUNCE;
                }
                c.vx *= PHYS.FRICTION;
              } else if (!a.fixed && !a.dragging) {
                a.y += ov.oy;
                if (a.vy < 0) a.vy = -a.vy * PHYS.BLOCK_BOUNCE;
              }
            }
          }
        }
      }
    }

    // 3. Recompute resting relationships
    for (const b of bodies) {
      b.restingOn.clear();
      b.supports.clear();
    }
    const TOL = 2;
    for (let i = 0; i < bodies.length; i++) {
      const a = bodies[i];
      // resting on floor
      if (Math.abs((a.y + a.h) - this.h) < TOL && Math.abs(a.vy) < 30) {
        // a is on the floor
      }
      for (let j = 0; j < bodies.length; j++) {
        if (i === j) continue;
        const c = bodies[j];
        // a resting on c if a's bottom ≈ c's top AND they overlap horizontally
        if (Math.abs((a.y + a.h) - c.y) < TOL) {
          const ox = Math.min(a.x + a.w, c.x + c.w) - Math.max(a.x, c.x);
          if (ox > 2) {
            a.restingOn.add(c.id);
            c.supports.add(a.id);
          }
        }
      }
    }

    // 4. Visual: decay justImpacted flag
    for (const b of bodies) {
      if (b.justImpacted > 0) b.justImpacted = Math.max(0, b.justImpacted - dt * 4);
    }

    // 5. Snap settled bodies to grid (hard snap once at rest, with one-frame
    // animation flag so the visual jump is eased by CSS). After snapping, hold
    // the body in place so gravity-induced micro-bounces don't drift it off-grid.
    if (this.snapEnabled) {
      const g = this.gridSize;
      for (const b of bodies) {
        if (b.fixed || b.dragging) continue;
        // Clear stale snap-anim flag so it only fires the frame we snap.
        if (b._snapAnimAt && performance.now() - b._snapAnimAt > 240) {
          b.snapAnim = false;
          b._snapAnimAt = 0;
        }
        const speed = Math.abs(b.vx) + Math.abs(b.vy);
        const onSomething = (b.restingOn && b.restingOn.size > 0)
          || Math.abs((b.y + b.h) - this.h) < 2;
        // Wake the body if it's been disturbed (pushed, dragged, or thrown).
        if (b._snapped && (!onSomething || speed > 120)) {
          b._snapped = false;
          b.restFrames = 0;
        }
        if (speed < 60 && onSomething) {
          b.restFrames = (b.restFrames || 0) + 1;
        } else {
          b.restFrames = 0;
        }
        if (b.restFrames >= 3) {
          const tx = Math.round(b.x / g) * g;
          // For y, align block bottom to a grid offset measured from the floor.
          const bottomGap = this.h - (b.y + b.h);
          const targetGap = Math.round(bottomGap / g) * g;
          const ty = this.h - targetGap - b.h;
          if (!b._snapped) {
            if (Math.abs(tx - b.x) > 0.5 || Math.abs(ty - b.y) > 0.5) {
              b.snapAnim = true;
              b._snapAnimAt = performance.now();
            }
            b._snapped = true;
          }
          // Hold the snapped body exactly on grid each frame.
          b.x = tx; b.y = ty;
          b.vx = 0; b.vy = 0;
        }
      }
    }
  }

  // Is this block in the "actionable zone" — touching the floor or only resting on floor-touching blocks?
  // (Equivalent: nothing it depends on is below it that isn't also on the floor.)
  // For our purposes, "actionable" = block's bottom is on the floor, OR all blocks beneath it are completed/gone.
  // Since blocks above auto-fall when below is removed, simpler: actionable = touching the floor.
  isActionable(id) {
    const b = this.bodies.get(id);
    if (!b) return false;
    return Math.abs((b.y + b.h) - this.h) < 3;
  }
}

window.PhysicsWorld = PhysicsWorld;
window.PHYS = PHYS;

</script>

// ── Color helpers ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  const v = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
  return {
    r: parseInt(v.slice(0, 2), 16),
    g: parseInt(v.slice(2, 4), 16),
    b: parseInt(v.slice(4, 6), 16),
  };
}
function rgbToHex({ r, g, b }) {
  const h = (n) => Math.round(n).toString(16).padStart(2, '0');
  return '#' + h(r) + h(g) + h(b);
}
function tint(hex, amt) {
  const c = hexToRgb(hex);
  return rgbToHex({
    r: c.r + (255 - c.r) * amt,
    g: c.g + (255 - c.g) * amt,
    b: c.b + (255 - c.b) * amt,
  });
}
function darken(hex, amt) {
  const c = hexToRgb(hex);
  return rgbToHex({ r: c.r * (1 - amt), g: c.g * (1 - amt), b: c.b * (1 - amt) });
}
function luminance(hex) {
  const { r, g, b } = hexToRgb(hex);
  const a = [r, g, b].map((v) => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
}
function readableFg(hex) {
  return luminance(hex) > 0.55 ? '#0a0e18' : '#ffffff';
}

// ── Platform-aware shortcut hints ────────────────────────────────────────────
// Returns the user-facing string for a shortcut. Mac shows ⌘, ⌥, etc.;
// everywhere else shows Ctrl, Alt, Shift. Tokens: mod, alt, shift, plus a key.
const __isMac = (() => {
  if (typeof navigator === 'undefined') return false;
  const p = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || '';
  return /mac/i.test(p);
})();
function formatShortcut(combo) {
  return combo.split('+').map((part) => {
    const k = part.trim().toLowerCase();
    if (k === 'mod')   return __isMac ? '⌘' : 'Ctrl';
    if (k === 'alt')   return __isMac ? '⌥' : 'Alt';
    if (k === 'shift') return __isMac ? '⇧' : 'Shift';
    return part.length === 1 ? part.toUpperCase() : part;
  }).join(__isMac ? '' : '+');
}

// ── HSL helpers ──────────────────────────────────────────────────────────────
function rgbToHsl({ r, g, b }) {
  const rn = r / 255, gn = g / 255, bn = b / 255;
  const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
  let h = 0, s = 0; const l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case rn: h = (gn - bn) / d + (gn < bn ? 6 : 0); break;
      case gn: h = (bn - rn) / d + 2; break;
      case bn: h = (rn - gn) / d + 4; break;
    }
    h *= 60;
  }
  return { h, s, l };
}
function hslToRgb({ h, s, l }) {
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const hp = h / 60;
  const x = c * (1 - Math.abs(hp % 2 - 1));
  let rp = 0, gp = 0, bp = 0;
  if (hp < 1) { rp = c; gp = x; }
  else if (hp < 2) { rp = x; gp = c; }
  else if (hp < 3) { gp = c; bp = x; }
  else if (hp < 4) { gp = x; bp = c; }
  else if (hp < 5) { rp = x; bp = c; }
  else { rp = c; bp = x; }
  const m = l - c / 2;
  return { r: (rp + m) * 255, g: (gp + m) * 255, b: (bp + m) * 255 };
}
function adjustSaturation(hex, mult) {
  const hsl = rgbToHsl(hexToRgb(hex));
  hsl.s = Math.max(0, Math.min(1, hsl.s * mult));
  return rgbToHex(hslToRgb(hsl));
}

// ── Reduced motion ───────────────────────────────────────────────────────────
function usePrefersReducedMotion() {
  const [reduced, setReduced] = React.useState(() =>
    typeof window !== 'undefined' && window.matchMedia
      ? window.matchMedia('(prefers-reduced-motion: reduce)').matches
      : false
  );
  React.useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
    const onChange = () => setReduced(mq.matches);
    mq.addEventListener('change', onChange);
    return () => mq.removeEventListener('change', onChange);
  }, []);
  return reduced;
}

// ── Resolve a tag's fill color ───────────────────────────────────────────────
function resolveTagFill(tag, palette, theme) {
  const idx = (tag && Number.isFinite(tag.colorIndex)) ? tag.colorIndex : 0;
  const swatches = palette.swatches;
  const base = swatches[idx % swatches.length];
  if (theme.fillMode === 'tint') return tint(base, 0.55);
  if (theme.fillMode === 'neon') return darken(base, 0.72);
  if (theme.fillMode === 'terminal') return 'rgba(0,20,8,0.85)';
  return base;
}

// ── Block ────────────────────────────────────────────────────────────────────

function Block({
  task, body, theme, palette, tagsById,
  selected, completing, deleting, editing, isActionable,
  onPointerDown, onResizeStart, onContextMenu, onDoubleClick,
  onCommitEdit, onCancelEdit, onComplete,
  resizing, flatBlocks, glowPulse, showActionableGlow, reducedMotion,
}) {
  const inputRef = React.useRef(null);
  React.useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const tag = tagsById[task.tag] || { name: task.tag, colorIndex: 0 };
  const fill = resolveTagFill(tag, palette, theme);

  // Neon: fg is always the palette color itself (bright), rest is dark bg
  let fg;
  if (theme.fillMode === 'neon') {
    const base = palette.swatches[(tag.colorIndex || 0) % palette.swatches.length];
    fg = base;
  } else if (theme.fillMode === 'terminal') {
    fg = '#00ff41';
  } else if (theme.fillMode === 'tint') {
    fg = theme.titleColor;
  } else {
    fg = readableFg(fill);
  }

  const deformY = flatBlocks ? 0 : (body.deform || 0);
  let sx = 1 - deformY * 0.6;
  let sy = 1 + deformY * 0.6;
  // Drag lift: scale up slightly when held; deform overrides this if active.
  if (body.dragging && !deformY) { sx = 1.03; sy = 1.03; }
  // Completion celebration: brief pop on the first ~80ms, then settle to fade scale.
  if (completing) { sx *= 0.92; sy *= 0.92; }
  if (deleting) { sx *= 0.92; sy *= 0.92; }
  const rot = flatBlocks ? 0 : (body.av || 0);

  // Flat mode overrides
  const flatShadow = theme.aesthetic === 'brutalist' ? '4px 4px 0 #000' : 'none';
  const flatBorder = theme.aesthetic === 'brutalist' ? '2px solid #000'
    : theme.aesthetic === 'terminal' ? '1px solid rgba(0,255,65,0.3)'
    : theme.aesthetic === 'neon' ? '1px solid rgba(255,255,255,0.12)'
    : theme.fillMode === 'tint' ? '1px solid rgba(0,0,0,0.10)' : 'none';

  // Neon glow border when not flat
  let neonGlow = 'none';
  if (theme.fillMode === 'neon' && !flatBlocks) {
    const base = palette.swatches[(tag.colorIndex || 0) % palette.swatches.length];
    neonGlow = `0 0 0 1px ${base}44, 0 0 16px ${base}55, 0 0 40px ${base}22`;
  }

  // Compose block shadow: theme shadow + optional drag lift + optional actionable halo.
  const baseShadow = flatBlocks ? flatShadow : (theme.fillMode === 'neon' ? neonGlow : theme.blockShadow);
  const dragShadow = body.dragging && !flatBlocks
    ? '0 14px 30px rgba(0,0,0,.45), 0 6px 12px rgba(0,0,0,.35)'
    : null;
  const haloOn = !!(showActionableGlow && isActionable && !completing && !deleting && !body.dragging);
  const haloPulse = haloOn ? (0.45 + 0.25 * Math.sin((glowPulse || 0) * 1.6)) : 0;
  const haloShadow = haloOn ? `0 0 0 1px ${theme.floorGlow}, 0 0 24px ${theme.floorGlow.replace(/[\d.]+\)$/, haloPulse.toFixed(2) + ')')}` : null;
  const composedShadow = [haloShadow, dragShadow || baseShadow].filter(Boolean).join(', ');

  // Build transition string. Animations are suppressed during drag/completing/
  // deleting so motion stays snappy when the user is actively moving things.
  let transitionStr;
  if (reducedMotion) {
    transitionStr = 'none';
  } else if (completing) {
    transitionStr = 'opacity .27s ease .08s, transform .35s cubic-bezier(.2,.8,.2,1)';
  } else if (deleting) {
    transitionStr = 'opacity .18s ease, transform .18s ease';
  } else if (body.snapAnim) {
    transitionStr = 'left .18s cubic-bezier(.2,.8,.2,1), top .18s cubic-bezier(.2,.8,.2,1), width .18s cubic-bezier(.2,.8,.2,1), height .18s cubic-bezier(.2,.8,.2,1)';
  } else if (body.dragging) {
    transitionStr = 'transform .12s ease, box-shadow .12s ease';
  } else {
    // Idle: cross-fade colors when palette/theme changes; quick lift-down.
    transitionStr = 'background-color .25s ease, border-color .25s ease, color .25s ease, transform .12s ease, box-shadow .25s ease';
  }

  const baseStyle = {
    position: 'absolute',
    left: body.x,
    top: body.y,
    width: body.w,
    height: body.h,
    transform: `rotate(${rot}rad) scale(${sx}, ${sy})`,
    transformOrigin: 'center bottom',
    background: fill,
    border: flatBlocks ? flatBorder : (theme.blockBorder || 'none'),
    borderRadius: theme.blockRadius,
    boxShadow: composedShadow,
    color: fg,
    fontFamily: theme.blockFontFamily,
    fontWeight: theme.blockFontWeight,
    cursor: body.dragging ? 'grabbing' : 'grab',
    userSelect: 'none',
    zIndex: body.dragging ? 100000 : Math.floor(body.y + body.h),
    transition: transitionStr,
    opacity: (completing || deleting) ? 0 : 1,
    willChange: 'transform, top, left, width, height',
    display: 'flex',
    flexDirection: 'column',
    padding: '8px 10px',
    boxSizing: 'border-box',
    overflow: 'hidden',
  };

  if (task.waiting) {
    baseStyle.opacity = completing ? 0 : 0.5;
    baseStyle.borderStyle = 'dashed';
    baseStyle.borderWidth = theme.aesthetic === 'brutalist' ? '2px' : '1.5px';
    baseStyle.borderColor = theme.aesthetic === 'brutalist' ? '#000'
      : theme.fillMode === 'terminal' ? 'rgba(0,255,65,0.3)'
      : theme.fillMode === 'neon' ? 'rgba(255,255,255,0.15)'
      : darken(fill, 0.3);
    baseStyle.boxShadow = theme.aesthetic === 'brutalist' ? '4px 4px 0 #000' : '0 2px 6px rgba(0,0,0,.06)';
  }

  if (selected) {
    baseStyle.outline = theme.aesthetic === 'brutalist'
      ? '3px solid #ff3d00'
      : `2px solid ${theme.accentColor}`;
    baseStyle.outlineOffset = '2px';
  }

  // Derive chip from the block's actual fill (resolveTagFill output) so chips
  // stay readable on light palettes / light themes. Brutalist/terminal/neon
  // keep their distinctive looks; everything else uses luminance-based contrast.
  let tagBg, tagFg;
  if (theme.aesthetic === 'brutalist') {
    tagBg = '#000'; tagFg = '#fff';
  } else if (theme.fillMode === 'terminal') {
    tagBg = 'rgba(0,255,65,0.12)'; tagFg = '#00ff41';
  } else if (theme.fillMode === 'neon') {
    tagBg = 'rgba(255,255,255,0.07)'; tagFg = fg;
  } else {
    const lightFill = luminance(fill) > 0.55;
    tagBg = lightFill ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,255,0.18)';
    tagFg = lightFill ? '#0a0e18' : '#ffffff';
  }

  return (
    <div
      style={baseStyle}
      onPointerDown={onPointerDown}
      onContextMenu={onContextMenu}
      onDoubleClick={onDoubleClick}
      data-block-id={task.id}
      data-block-role="block"
    >
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
        <span style={{
          fontSize: 9.5,
          letterSpacing: '0.08em',
          textTransform: 'uppercase',
          fontWeight: 700,
          padding: '2px 6px',
          borderRadius: (theme.aesthetic === 'brutalist' || theme.aesthetic === 'terminal') ? 0 : 999,
          background: tagBg,
          color: tagFg,
          opacity: task.waiting ? 0.7 : 1,
        }}>{tag.name}</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          {isActionable && !editing && !task.waiting && (
            <button
              onPointerDown={(e) => { e.stopPropagation(); }}
              onClick={(e) => { e.stopPropagation(); onComplete(); }}
              title="Mark complete"
              aria-label="Mark complete"
              style={{
                width: 24, height: 24,
                borderRadius: (theme.aesthetic === 'brutalist' || theme.aesthetic === 'terminal') ? 0 : '50%',
                border: theme.aesthetic === 'brutalist' ? '2px solid #000'
                  : theme.fillMode === 'terminal' ? '1px solid #00ff41'
                  : theme.fillMode === 'neon' ? `1px solid ${fg}`
                  : `1.5px solid ${darken(fill, 0.35)}`,
                background: theme.aesthetic === 'brutalist' ? '#fff'
                  : theme.fillMode === 'terminal' ? 'rgba(0,255,65,0.1)'
                  : theme.fillMode === 'neon' ? 'rgba(255,255,255,0.07)'
                  : 'rgba(255,255,255,.55)',
                color: theme.aesthetic === 'brutalist' ? '#000'
                  : theme.fillMode === 'terminal' ? '#00ff41'
                  : theme.fillMode === 'neon' ? fg
                  : darken(fill, 0.5),
                cursor: 'pointer',
                padding: 0,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                boxShadow: theme.aesthetic === 'brutalist' ? '2px 2px 0 #000' : 'none',
                transition: 'transform .1s, background .1s',
                flexShrink: 0,
              }}
              onMouseEnter={(e) => {
                e.currentTarget.style.background = theme.aesthetic === 'brutalist' ? '#ffeb00'
                  : theme.fillMode === 'terminal' ? 'rgba(0,255,65,0.25)'
                  : '#fff';
                e.currentTarget.style.transform = 'scale(1.15)';
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.background = theme.aesthetic === 'brutalist' ? '#fff'
                  : theme.fillMode === 'terminal' ? 'rgba(0,255,65,0.1)'
                  : 'rgba(255,255,255,.55)';
                e.currentTarget.style.transform = 'scale(1)';
              }}
            >
              <svg width="12" height="12" viewBox="0 0 12 12">
                <path d="M2.5 6.5 L5 9 L9.5 3.5" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          )}
          <span style={{
            fontSize: 9.5,
            letterSpacing: '0.05em',
            fontWeight: 600,
            opacity: 0.6,
            fontVariantNumeric: 'tabular-nums',
          }}>{task.size}</span>
        </div>
      </div>

      {editing ? (
        <input
          ref={inputRef}
          defaultValue={task.title}
          onBlur={(e) => onCommitEdit(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === 'Enter') { e.preventDefault(); onCommitEdit(e.target.value); }
            if (e.key === 'Escape') { e.preventDefault(); onCancelEdit(); }
          }}
          style={{
            marginTop: 2,
            background: 'rgba(255,255,255,.5)',
            border: 'none',
            outline: '2px solid rgba(0,0,0,.4)',
            font: 'inherit',
            color: '#0a0e18',
            padding: '2px 4px',
            borderRadius: (theme.aesthetic === 'brutalist' || theme.aesthetic === 'terminal') ? 0 : 4,
            width: '100%',
            boxSizing: 'border-box',
          }}
        />
      ) : (
        <div style={{
          marginTop: 4,
          fontSize: Math.max(11, Math.min(15, body.h * 0.16)),
          lineHeight: 1.2,
          textWrap: 'pretty',
          flex: 1,
          overflow: 'hidden',
          textOverflow: 'ellipsis',
          paddingRight: 0,
        }}>
          {task.title}
        </div>
      )}

      {!editing && !completing && (
        <React.Fragment>
          {[
            { dir: 'n',  style: { top: -3, left: 8, right: 8, height: 8, cursor: 'ns-resize' } },
            { dir: 's',  style: { bottom: -3, left: 8, right: 8, height: 8, cursor: 'ns-resize' } },
            { dir: 'w',  style: { left: -3, top: 8, bottom: 8, width: 8, cursor: 'ew-resize' } },
            { dir: 'e',  style: { right: -3, top: 8, bottom: 8, width: 8, cursor: 'ew-resize' } },
            { dir: 'nw', style: { top: -4, left: -4, width: 12, height: 12, cursor: 'nwse-resize' } },
            { dir: 'ne', style: { top: -4, right: -4, width: 12, height: 12, cursor: 'nesw-resize' } },
            { dir: 'sw', style: { bottom: -4, left: -4, width: 12, height: 12, cursor: 'nesw-resize' } },
            { dir: 'se', style: { bottom: -4, right: -4, width: 12, height: 12, cursor: 'nwse-resize' } },
          ].map((h) => (
            <div
              key={h.dir}
              data-resize-dir={h.dir}
              onPointerDown={(e) => onResizeStart(e, h.dir)}
              onDoubleClick={(e) => e.stopPropagation()}
              style={{
                position: 'absolute',
                ...h.style,
                zIndex: 2,
                touchAction: 'none',
              }}
            />
          ))}
          <div style={{
            position: 'absolute',
            right: 2, bottom: 2,
            width: 12, height: 12,
            opacity: selected ? 0.6 : 0.25,
            color: fg,
            pointerEvents: 'none',
            transition: 'opacity .15s',
          }}>
            <svg width="12" height="12" viewBox="0 0 12 12" style={{ display: 'block' }}>
              <path d="M12 4 L4 12 M12 8 L8 12" stroke="currentColor" strokeWidth="1.2" />
            </svg>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

// ── Context Menu ─────────────────────────────────────────────────────────────

function ContextMenu({ x, y, items, theme, onClose }) {
  React.useEffect(() => {
    const close = () => onClose();
    window.addEventListener('mousedown', close);
    window.addEventListener('blur', close);
    return () => {
      window.removeEventListener('mousedown', close);
      window.removeEventListener('blur', close);
    };
  }, [onClose]);

  return (
    <div
      onMouseDown={(e) => e.stopPropagation()}
      style={{
        position: 'fixed',
        left: x, top: y,
        background: theme.panelBg,
        backdropFilter: 'blur(20px) saturate(160%)',
        WebkitBackdropFilter: 'blur(20px) saturate(160%)',
        border: theme.aesthetic === 'brutalist' ? `2px solid ${theme.panelBorder}` : `0.5px solid ${theme.panelBorder}`,
        borderRadius: theme.aesthetic === 'brutalist' ? 0 : 10,
        boxShadow: theme.aesthetic === 'brutalist' ? '4px 4px 0 #000' : '0 12px 40px rgba(0,0,0,.18)',
        padding: 4,
        minWidth: 200,
        zIndex: 1000,
        fontFamily: theme.blockFontFamily,
        fontSize: 12,
        color: theme.panelText,
      }}
    >
      {items.map((item, i) => item.divider ? (
        <div key={i} style={{ height: 1, background: theme.panelBorder, margin: '4px 0' }} />
      ) : (
        <button
          key={i}
          onClick={() => { item.onClick(); onClose(); }}
          disabled={item.disabled}
          style={{
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            width: '100%',
            padding: '7px 10px',
            border: 0,
            background: 'transparent',
            color: 'inherit',
            font: 'inherit',
            textAlign: 'left',
            borderRadius: theme.aesthetic === 'brutalist' ? 0 : 6,
            opacity: item.disabled ? 0.4 : 1,
            cursor: item.disabled ? 'not-allowed' : 'default',
          }}
          onMouseEnter={(e) => { if (!item.disabled) e.currentTarget.style.background = theme.aesthetic === 'modern' ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.08)'; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}
        >
          <span>{item.label}</span>
          {item.shortcut && <span style={{ opacity: 0.5, fontSize: 10, fontVariantNumeric: 'tabular-nums' }}>{item.shortcut}</span>}
        </button>
      ))}
    </div>
  );
}

// ── Group Label ──────────────────────────────────────────────────────────────

function GroupLabel({ group, theme, onRename, onDelete }) {
  const [editing, setEditing] = React.useState(group.justCreated);
  const inputRef = React.useRef(null);
  React.useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const { x1, y1, x2 } = group.bbox;

  return (
    <div
      style={{
        position: 'absolute',
        left: x1 - 6,
        top: y1 - 28,
        width: x2 - x1 + 12,
        pointerEvents: 'none',
      }}
    >
      <div style={{
        position: 'absolute',
        left: 0, top: 22,
        right: 0, bottom: -(group.bbox.y2 - group.bbox.y1 + 10),
        border: `1.5px dashed ${theme.accentColor}`,
        borderRadius: theme.aesthetic === 'brutalist' ? 0 : 8,
        opacity: 0.5,
      }} />
      <div
        style={{
          display: 'inline-flex',
          alignItems: 'center',
          gap: 6,
          background: theme.accentColor,
          color: theme.aesthetic === 'modern' ? '#fff' : (theme.aesthetic === 'brutalist' ? '#fff' : '#0a0e18'),
          padding: '3px 10px',
          fontSize: 10.5,
          fontWeight: 700,
          letterSpacing: '0.06em',
          textTransform: 'uppercase',
          borderRadius: theme.aesthetic === 'brutalist' ? 0 : 999,
          fontFamily: theme.blockFontFamily,
          pointerEvents: 'auto',
          boxShadow: theme.aesthetic === 'brutalist' ? '2px 2px 0 #000' : '0 2px 8px rgba(0,0,0,.15)',
        }}
        onDoubleClick={() => setEditing(true)}
      >
        {editing ? (
          <input
            ref={inputRef}
            defaultValue={group.label}
            onBlur={(e) => { onRename(e.target.value || 'group'); setEditing(false); }}
            onKeyDown={(e) => {
              if (e.key === 'Enter') { onRename(e.target.value || 'group'); setEditing(false); }
              if (e.key === 'Escape') { setEditing(false); }
            }}
            style={{
              background: 'rgba(255,255,255,.25)',
              border: 0,
              outline: 'none',
              font: 'inherit',
              color: 'inherit',
              width: 120,
              padding: 0,
            }}
          />
        ) : (
          <span>{group.label}</span>
        )}
        <button
          onClick={onDelete}
          style={{
            border: 0,
            background: 'transparent',
            color: 'inherit',
            opacity: 0.7,
            cursor: 'default',
            padding: 0,
            font: 'inherit',
            lineHeight: 1,
          }}
          aria-label="Remove group"
        >×</button>
      </div>
    </div>
  );
}

// ── Palette Manager ──────────────────────────────────────────────────────────

function PaletteManager({
  theme, palettes, currentPaletteId, onPickPalette,
  tags, onUpdateTags,
  customSwatches, onUpdateCustomSwatches,
  onClose,
}) {
  const palette = palettes.find((p) => p.id === currentPaletteId) || palettes[0];
  const swatches = customSwatches[palette.id] || palette.swatches;
  const isCustom = !!customSwatches[palette.id];

  // Saturation slider state — local, resets on palette change. Acts as a
  // multiplier (0–2x) applied to all 6 current swatches and committed as a
  // normal palette customization.
  const [satPct, setSatPct] = React.useState(100);
  const satBaseRef = React.useRef(swatches);
  React.useEffect(() => {
    setSatPct(100);
    satBaseRef.current = customSwatches[palette.id] || palette.swatches;
  }, [palette.id]);

  const fontFamily = theme.blockFontFamily;
  const text = theme.panelText;

  const updateSwatch = (i, color) => {
    const next = [...swatches];
    next[i] = color;
    onUpdateCustomSwatches({ ...customSwatches, [palette.id]: next });
    satBaseRef.current = next;
    setSatPct(100);
  };
  const applySaturation = (pct) => {
    setSatPct(pct);

          {section === 'palettes' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <SettingsGroup label="Color palette">
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                  {palettes.map((p) => {
                    const sw = customSwatches[p.id] || p.swatches;
                    const active = p.id === t.paletteId;
                    return (
                      <button key={p.id} onClick={() => setTweak('paletteId', p.id)} style={{
                        appearance: 'none',
                        border: active ? `2px solid ${theme.accentColor}` : `1.5px solid ${divider}`,
                        borderRadius: theme.aesthetic === 'brutalist' ? 0 : 8,
                        background: active ? (isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)') : 'transparent',
                        cursor: 'default',
                        padding: '8px 10px',
                        textAlign: 'left',
                        transition: 'border-color .12s',
                      }}>
                        <div style={{ display: 'flex', gap: 2, height: 8, marginBottom: 5 }}>
                          {sw.map((c, i) => <div key={i} style={{ flex: 1, background: c, borderRadius: 1 }} />)}
                        </div>
                        <div style={{ fontSize: 10.5, fontWeight: 600, color: theme.panelText, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</div>
                        {customSwatches[p.id] && <div style={{ fontSize: 9, opacity: 0.4, marginTop: 1 }}>customised</div>}
                      </button>
                    );
                  })}
                </div>
              </SettingsGroup>
              <SettingsGroup label="Advanced">
                <SettingsActionButton theme={theme} onClick={onOpenPalette} isDark={isDark}>
                  Edit swatches & tags…
                </SettingsActionButton>
              </SettingsGroup>
            </div>
          )}

          {/* ── Board ── */}
          {section === 'board' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <SettingsGroup label="Actions">
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <SettingsActionButton theme={theme} isDark={isDark} onClick={addTask}>
                    + Drop random task
                  </SettingsActionButton>
                  <SettingsActionButton
                    theme={theme}
                    isDark={isDark}
                    destructive
                    onClick={() => {
                      if (clearArmed) { clearBoard(); setClearArmed(false); }
                      else { setClearArmed(true); }
                    }}
                  >
                    {clearArmed ? 'Click again to confirm — clears all tasks' : 'Clear board'}
                  </SettingsActionButton>
                </div>
              </SettingsGroup>
              <SettingsGroup label="Backup">
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <SettingsActionButton theme={theme} isDark={isDark} onClick={onExport}>
                    Export to file…
                  </SettingsActionButton>
                  <SettingsActionButton
                    theme={theme}
                    isDark={isDark}
                    onClick={() => fileInputRef.current && fileInputRef.current.click()}
                  >
                    Import from file…
                  </SettingsActionButton>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="application/json,.json"
                    style={{ display: 'none' }}
                    onChange={(e) => {
                      const f = e.target.files && e.target.files[0];
                      if (f) onImport(f);
                      e.target.value = '';
                    }}
                  />
                  {importError && (
                    <div style={{
                      fontSize: 11,
                      color: '#ff6b6b',
                      padding: '4px 2px',
                      lineHeight: 1.4,
                    }}>{importError}</div>
                  )}
                </div>
              </SettingsGroup>
              <SettingsGroup label="Keyboard shortcuts">
                <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '6px 12px', fontSize: 11 }}>
                  {[
                    ['drag', 'move block'],
                    ['drag corner', 'resize'],
                    ['✓ tick', 'complete (floor only)'],
                    ['double-click', 'edit title'],
                    ['right-click', 'context menu'],
                    ['drag empty', 'lasso select'],
                    [formatShortcut('mod+n'), 'new task'],
                    ['enter', 'complete selected'],
                    ['delete / ⌫', 'delete selected'],
                    ['g', 'group selected (2+)'],
                    ['space', 'pause / resume gravity'],
                    ['shift-click', 'add to selection'],
                    ['?', 'help overlay'],
                  ].map(([k, v]) => (
                    <React.Fragment key={k}>
                      <div style={{
                        fontSize: 10, padding: '2px 6px',
                        background: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)',
                        color: theme.panelText,
                        borderRadius: theme.aesthetic === 'brutalist' ? 0 : 4,
                        fontFamily: 'ui-monospace, monospace', whiteSpace: 'nowrap',
                        alignSelf: 'start',
                      }}>{k}</div>
                      <div style={{ opacity: 0.6, alignSelf: 'center' }}>{v}</div>
                    </React.Fragment>
                  ))}
                </div>
              </SettingsGroup>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

        {label}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {children}
      </div>

}

function SettingsRow({ label, sub, children }) {

function ToggleSwitch({ value, onChange, theme }) {

    <button

        height: 20,

      }}
    >
      <span style={{

        top: 3, left: value ? 17 : 3,
        width: 14, height: 14,
